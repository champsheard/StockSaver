<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate An API Key - StockSaver</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .form-section {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        form {
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1em;
        }
        input {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.3);
        }
        button {
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        #res {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            font-size: 14px;
            line-height: 1.4;
        }
        .api-key-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .copy-btn {
            padding: 10px 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
            display: none;
        }
        .copy-btn:hover {
            background: #0b7dda;
        }
        .copy-btn.copied {
            background: #4CAF50;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        .back-link {
            text-align: center;
            margin-top: 40px;
        }
        .back-link a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .instructions {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.9;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Generate Your API Key</h1>

        <p class="instructions">Enter a username to get your personal API key for accessing StockSaver's stock tracking features.</p>

        <div class="form-section">
            <form id="apiForm">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required placeholder="Choose a unique username">
                <button type="submit">Generate API Key</button>
            </form>

            <div id="res">
                <div class="api-key-container">
                    <span id="api-key-text"></span>
                    <button class="copy-btn" id="copyBtn" onclick="copyApiKey()">📋 Copy</button>
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById("apiForm");
        const resElement = document.getElementById('res');
        const apiKeyText = document.getElementById('api-key-text');
        const copyBtn = document.getElementById('copyBtn');
        let currentApiKey = '';

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value;

            apiKeyText.textContent = 'Generating API key...';
            resElement.className = '';
            copyBtn.style.display = 'none';
            currentApiKey = '';

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (response.ok) {
                    currentApiKey = data.apiKey;
                    apiKeyText.textContent = `Your API Key: ${data.apiKey}`;
                    resElement.className = 'success';
                    copyBtn.style.display = 'inline-block';
                    copyBtn.textContent = '📋 Copy';
                    copyBtn.classList.remove('copied');
                } else {
                    apiKeyText.textContent = data.message || 'Failed to generate API key.';
                    resElement.className = 'error';
                    copyBtn.style.display = 'none';
                }

            } catch (error) {
                console.error('Error generating API key:', error);
                apiKeyText.textContent = 'Failed to generate API key. Please try again.';
                resElement.className = 'error';
                copyBtn.style.display = 'none';
            }
        });

        function copyApiKey() {
            if (currentApiKey) {
                navigator.clipboard.writeText(currentApiKey).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                    // Fallback for older browsers
                    const textArea = document.createElement('textarea');
                    textArea.value = currentApiKey;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
