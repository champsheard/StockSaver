<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs</title>
</head>
<body>
    <script>
        fetch('/docs')
            .then(response => response.text())
            .then(html => {
                document.body.innerHTML = html;
            })
            .catch(error => {
                console.error('Error fetching API documentation:', error);
                document.body.innerHTML = '<p>Failed to load API documentation.</p>';
            });
    </script>
</body>
</html>
